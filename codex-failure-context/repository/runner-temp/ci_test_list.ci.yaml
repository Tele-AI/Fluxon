schema_version: 9
run:
  mode: full_once
  selectors:
    case_ids: ALL
    profile_ids:
    - fluxon_tcp
    command_ids: ALL
    test_ids: ALL
scenes:
  ci_top_attention_doc_page_build:
    ci:
      subject: doc_page
      runtime_contract: rust_self_managed
      prepare:
      - kind: online_docker_image
        image_ref: hanbaoaaa/fluxon-doc-site-builder:quartz-v5.0.0-node-v24.16.0
        env: FLUXON_DOC_SITE_DOCKER_IMAGE_REF
      commands:
      - id: top_attention_doc_page_build
        command: __RUN_DIR__/venv/bin/python3 -u __RUN_DIR__/src/fluxon_test_stack/top_attention_test_index/_doc_page_build.py
          --case-config __RUN_DIR__/configs/ci_scene_config.yaml
        timeout_seconds: 10800
    select:
      scales:
      - n1_kvowner_dram_3gib
      profiles:
      - fluxon_tcp
  ci_top_attention_bin_kvtest:
    ci:
      subject: rust
      runtime_contract: rust_self_managed
      commands:
      - id: top_attention_bin_kvtest
        command: __RUN_DIR__/venv/bin/python3 -u __RUN_DIR__/src/fluxon_test_stack/top_attention_test_index/_bin_kvtest.py
          --case-config __RUN_DIR__/configs/ci_scene_config.yaml
        timeout_seconds: 21600
    select:
      scales:
      - n1_kvowner_dram_20gib
      profiles:
      - fluxon_tcp
  ci_top_attention_log_mgmt:
    ci:
      subject: rust
