profiles:
  fluxon_tcp:
    artifact_set: fluxon_tcp
    runtime:
      ci:
        deploy:
          adapter_cmd:
          - test_profile_adapter.py
          controller_url: __STACK_CONTROLLER_URL__
          target_ip_map:
            infra44-ThinkStation-PX: 192.168.151.44
            infra46-ThinkStation-PX: 192.168.151.46
          bootstrap_ready_timeout_seconds: 300
        scene_configs:
          ci_top_attention_doc_page_build:
            doc_site_base_url: Tele-AI.github.io/Fluxon
          ci_top_attention_bin_kvtest:
            kv_test_rounds: p2p_only
          ci_top_attention_cargo_fs_core: {}
          ci_top_attention_cargo_util: {}
          ci_top_attention_cargo_kv_unit:
            kv_transport_feature: tcp_thread_transport
          ci_top_attention_log_mgmt:
            enabled: true
          ci_top_attention_mq_core: {}
          ci_top_attention_ctrl_c_kv: {}
          ci_top_attention_ctrl_c_mq: {}
          ci_top_attention_mq_mpsc: {}
          ci_top_attention_mq_mpmc: {}
          ci_top_attention_mq_mpmc_bench: {}
          ci_top_attention_largescale_mq: {}
        runtime_contracts:
          cluster_kv_owner:
            base_runtime:
              etcd:
                target: infra44-ThinkStation-PX
                endpoint:
                  scheme: HTTP
                  host_port: 32579
              greptime:
                target: infra44-ThinkStation-PX
                endpoint:
                  scheme: HTTP
                  host_port: 34030
            case_runtime:
              master:
                lifecycle: service
                k8s_ref: deployment/master
                deployer:
                  target: infra44-ThinkStation-PX
                  command:
                  - /bin/bash
                  - -lc
                  args:
                  - "set -euo pipefail\ncd __RUN_DIR__/src\nexec __RUN_DIR__/venv/bin/python3\
                    \ -m fluxon_py.runtime.start_master \\\n  -c __RUN_DIR__/configs/ci_master.yaml\
                    \ \\\n  -w __RUN_DIR__/services/master\n"
              owner_0:
                lifecycle: service
                k8s_ref: deployment/owner_0
                deployer:
                  target: __TARGET__
                  command:
                  - /bin/bash
                  - -lc
                  args:
                  - "set -euo pipefail\ncd __RUN_DIR__/src\nexec __RUN_DIR__/venv/bin/python3\
                    \ -m fluxon_py.runtime.start_owner_kvclient \\\n  -c __RUN_DIR__/configs/ci_owner_0.yaml\
                    \ \\\n  -w __RUN_DIR__/services/owner_0\n"
              ci_runner:
                lifecycle: job
                k8s_ref: deployment/ci_runner
                deployer: &id002
                  target: __TARGET__
                  command:
                  - /bin/bash
                  - -lc
                  args:
                  - 'set -uo pipefail

                    exec bash __RUN_DIR__/ci_runner.sh

                    '
          rust_self_managed:
            base_runtime:
              etcd:
                target: infra44-ThinkStation-PX
                endpoint:
                  scheme: HTTP
                  host_port: 32579
              greptime:
                target: infra44-ThinkStation-PX
                endpoint:
                  scheme: HTTP
                  host_port: 34030
            case_runtime:
              ci_runner:
                lifecycle: job
                k8s_ref: deployment/ci_runner
                deployer: *id002
      test_stack:
        kind: FLUXON
        coordinator_ready_timeout_seconds: 300
        port_alloc:
          by_topology:
            1:
              coordinator_port_base: 17779
              coordinator_port_stride: 10
              kv_master_port_base: 50061
              kv_master_port_stride: 10
              kv_p2p_port_base: 11666
              kv_p2p_port_stride: 66
            2:
              coordinator_port_base: 18779
              coordinator_port_stride: 10
              kv_master_port_base: 50161
              kv_master_port_stride: 10
              kv_p2p_port_base: 11666
              kv_p2p_port_stride: 66
        deploy:
          adapter_cmd:
          - test_profile_adapter.py
          controller_url: __STACK_CONTROLLER_URL__
          target_ip_map:
            infra44-ThinkStation-PX: 192.168.151.44
            infra46-ThinkStation-PX: 192.168.151.46
          bootstrap_ready_timeout_seconds: 300
        runtime_config:
          kv_base:
            instance_key: bench_base
            contribute_to_cluster_pool_size:
              dram: 0
              vram: {}
            fluxonkv_spec:
              cluster_name: __STACK_CLUSTER_NAME__
              share_mem_path: __STACK_SHARE_MEM_PATH__
          mq_base:
            capacity: 40
            ttl_seconds: 90
          kv_node_patch_template: {}
        deploy_templates:
          coordinator:
            lifecycle: service
            k8s_ref: deployment/test_stack_coord
            deployer:
              target: infra44-ThinkStation-PX
              command:
              - /bin/bash
              - -lc
              args:
              - '# Placeholder only. test_runner.py rewrites the actual TEST_STACK

                # launch command and resolves the interpreter from target hostworkdir.

                :

                '
          node:
            lifecycle: job
            k8s_ref: deployment/test_stack_node___INSTANCE_KEY__
            deployer:
              target: __TARGET__
              command:
              - /bin/bash
              - -lc
              args:
              - '# Placeholder only. test_runner.py rewrites the actual TEST_STACK

                # launch command and resolves the interpreter from target hostworkdir.

                : "__INSTANCE_KEY__ __COORDINATOR__"

                '
