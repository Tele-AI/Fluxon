      - n1_kvowner_dram_20gib
      profiles:
      - fluxon_tcp
  ci_top_attention_mq_core:
    ci:
      subject: mq
      runtime_contract: cluster_kv_owner
      commands:
      - id: top_attention_mq_core
        command: __RUN_DIR__/venv/bin/python3 -u __RUN_DIR__/src/fluxon_test_stack/top_attention_test_index/_mq_core.py
          --case-config __RUN_DIR__/configs/ci_scene_config.yaml
        timeout_seconds: 21600
    select:
