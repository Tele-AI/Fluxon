        command: __RUN_DIR__/venv/bin/python3 -u __RUN_DIR__/src/fluxon_test_stack/top_attention_test_index/_largescale_mq.py
          --single-host-logical-targets --testbed-bundle-source __TEST_BED_BUNDLE_ROOT__
          --workdir __WORKDIR_ROOT__/largescale_mq_ci_single_host/p160_c8 --owner-count
          4 --owner-dram-gib 1 --producer-count 160 --consumer-count 8 --threads-per-process
          1 --duration-seconds 90 --metric-warmup-seconds 60 --value-size 256 --op-timeout-seconds
          5 --cluster-ready-timeout-seconds 1800 --consumer-sim-min-ms 1 --consumer-sim-max-ms
          1
        timeout_seconds: 21600
    select:
      scales:
      - n1_kvowner_dram_3gib
      profiles:
      - fluxon_tcp
scales:
  n1_kvowner_dram_3gib:
    duration_seconds: 60
    topology: 1
    targets:
      hosts:
      - infra44-ThinkStation-PX
    owner:
      owner_count: 1
      owner_dram_bytes: 3221225472
    benchmark: &id001
      processes_per_target: 1
      threads_per_process: 4
      value_size: 16384
      metric_warmup_seconds: 0
      op_timeout_seconds: 30
      cluster_ready_timeout_seconds: 660
      value_size_list: []
      consumer_sim_handle_ms_range:
      - 700
      - 1500
  n1_kvowner_dram_20gib:
    duration_seconds: 60
    topology: 1
    targets:
      hosts:
      - infra44-ThinkStation-PX
    owner:
      owner_count: 1
      owner_dram_bytes: 21474836480
    benchmark: *id001
  n2_kvowner_dram_3gib:
