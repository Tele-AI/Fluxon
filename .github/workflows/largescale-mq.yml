name: largescale_mq

on:
  workflow_dispatch:
    inputs:
      run_mode:
        description: "run executes the TEST_STACK workload; generate_only only validates suite generation"
        required: true
        type: choice
        options:
          - run
          - generate_only
        default: run
      config_path:
        description: "Base TEST_STACK suite YAML"
        required: true
        type: string
      workdir:
        description: "test_runner workdir for the large-scale MQ run"
        required: true
        type: string
        default: .dever/largescale_mq
      testbed_bundle_path:
        description: "Existing TEST_STACK testbed bundle directory on the self-hosted runner"
        required: true
        type: string
      start_config_relpath:
        description: "Start-testbed config path inside the testbed bundle"
        required: true
        type: string
        default: start_test_bed.runner.yaml
      profiles:
        description: "Comma-separated TEST_STACK profile ids"
        required: true
        type: string
        default: fluxon_tcp_thread
      owner_count:
        description: "Owner count"
        required: true
        type: string
        default: "4"
      owner_dram_gib:
        description: "Owner DRAM GiB per owner"
        required: true
        type: string
        default: "1"
      producer_count:
        description: "Producer count"
        required: true
        type: string
        default: "160"
      consumer_count:
        description: "Consumer count"
        required: true
        type: string
        default: "8"
      duration_seconds:
        description: "Benchmark duration seconds"
        required: true
        type: string
        default: "60"
      value_size:
        description: "Message value size bytes"
        required: true
        type: string
        default: "256"
      op_timeout_seconds:
        description: "Per-operation timeout seconds"
        required: true
        type: string
        default: "30"
      cluster_ready_timeout_seconds:
        description: "Cluster readiness timeout seconds"
        required: true
        type: string
        default: "1800"
      consumer_sim_min_ms:
        description: "Minimum simulated consumer handle time in milliseconds"
        required: true
        type: string
        default: "700"
      consumer_sim_max_ms:
        description: "Maximum simulated consumer handle time in milliseconds"
        required: true
        type: string
        default: "1500"

permissions:
  contents: read

concurrency:
  group: largescale-mq-${{ github.ref }}
  cancel-in-progress: false

jobs:
  largescale-mq:
    runs-on:
      - self-hosted
      - Linux
      - X64
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Python dependencies
        run: python3 -m pip install PyYAML

      - name: Sync rather_no_git_submodule workspace inputs
        run: python3 fluxon_rs/scripts/rather_no_git_submodule.py

      - name: Generate large-scale MQ suite
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import shlex
          import subprocess
          import sys
          from pathlib import Path

          runner_temp = Path(${{ toJSON(runner.temp) }})
          suite_out = runner_temp / "largescale_mq_suite.yaml"
          profiles = [item.strip() for item in ${{ toJSON(inputs.profiles) }}.split(",") if item.strip()]
          if not profiles:
              raise SystemExit("profiles input must contain at least one profile id")

          cmd = [
              sys.executable,
              "-u",
              "fluxon_test_stack/top_attention_test_index/_largescale_mq.py",
              "--generate-only",
              "--config",
              ${{ toJSON(inputs.config_path) }},
              "--workdir",
              ${{ toJSON(inputs.workdir) }},
              "--suite-out",
              str(suite_out),
              "--owner-count",
              ${{ toJSON(inputs.owner_count) }},
              "--owner-dram-gib",
              ${{ toJSON(inputs.owner_dram_gib) }},
              "--producer-count",
              ${{ toJSON(inputs.producer_count) }},
              "--consumer-count",
              ${{ toJSON(inputs.consumer_count) }},
              "--duration-seconds",
              ${{ toJSON(inputs.duration_seconds) }},
              "--value-size",
              ${{ toJSON(inputs.value_size) }},
              "--op-timeout-seconds",
              ${{ toJSON(inputs.op_timeout_seconds) }},
              "--cluster-ready-timeout-seconds",
              ${{ toJSON(inputs.cluster_ready_timeout_seconds) }},
              "--consumer-sim-min-ms",
              ${{ toJSON(inputs.consumer_sim_min_ms) }},
              "--consumer-sim-max-ms",
              ${{ toJSON(inputs.consumer_sim_max_ms) }},
          ]
          for profile in profiles:
              cmd.extend(["--profile", profile])
          print("RUN: " + shlex.join(cmd), flush=True)
          subprocess.check_call(cmd)
          PY

      - name: Run large-scale MQ benchmark
        if: ${{ inputs.run_mode == 'run' }}
        run: |
          python3 - <<'PY'
          from __future__ import annotations

          import shlex
          import subprocess
          import sys

          profiles = [item.strip() for item in ${{ toJSON(inputs.profiles) }}.split(",") if item.strip()]
          if not profiles:
              raise SystemExit("profiles input must contain at least one profile id")

          cmd = [
              sys.executable,
              "-u",
              "fluxon_test_stack/top_attention_test_index/_largescale_mq.py",
              "--config",
              ${{ toJSON(inputs.config_path) }},
              "--workdir",
              ${{ toJSON(inputs.workdir) }},
              "--testbed-bundle-source",
              ${{ toJSON(inputs.testbed_bundle_path) }},
              "--start-config-relpath",
              ${{ toJSON(inputs.start_config_relpath) }},
              "--owner-count",
              ${{ toJSON(inputs.owner_count) }},
              "--owner-dram-gib",
              ${{ toJSON(inputs.owner_dram_gib) }},
              "--producer-count",
              ${{ toJSON(inputs.producer_count) }},
              "--consumer-count",
              ${{ toJSON(inputs.consumer_count) }},
              "--duration-seconds",
              ${{ toJSON(inputs.duration_seconds) }},
              "--value-size",
              ${{ toJSON(inputs.value_size) }},
              "--op-timeout-seconds",
              ${{ toJSON(inputs.op_timeout_seconds) }},
              "--cluster-ready-timeout-seconds",
              ${{ toJSON(inputs.cluster_ready_timeout_seconds) }},
              "--consumer-sim-min-ms",
              ${{ toJSON(inputs.consumer_sim_min_ms) }},
              "--consumer-sim-max-ms",
              ${{ toJSON(inputs.consumer_sim_max_ms) }},
          ]
          for profile in profiles:
              cmd.extend(["--profile", profile])
          print("RUN: " + shlex.join(cmd), flush=True)
          subprocess.check_call(cmd)
          PY

      - name: Upload large-scale MQ generated suite
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: largescale-mq-suite-${{ github.sha }}
          if-no-files-found: warn
          compression-level: 1
          path: ${{ runner.temp }}/largescale_mq_suite.yaml
